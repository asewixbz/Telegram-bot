version: '3.9'

services:
  bot:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    init: true
    restart: unless-stopped
    stop_grace_period: 30s
    volumes:
      - ./data:/app/data
      - ./backups:/app/backups
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
